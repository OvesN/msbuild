name: Validate YAML template references

on:
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - 'eng/Validate-YamlTemplateReferences.ps1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate template references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validator
        shell: pwsh
        run: ./eng/Validate-YamlTemplateReferences.ps1
